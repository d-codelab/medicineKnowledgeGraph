<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
index
<button onclick="callLogin1()">Call login1</button>

<script>
    function callLogin1() {
        fetch('http://localhost:8100/api/user/login1') // 发起 GET 请求
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text(); // 返回响应的文本内容
            })
            .then(data => {
                console.log(data); // 在控制台打印响应内容
                // 在这里可以根据响应内容进行其他操作
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
</script>
</body>
</html>
